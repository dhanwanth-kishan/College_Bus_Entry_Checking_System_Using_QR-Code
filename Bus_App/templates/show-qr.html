{% extends "student-dashboard.html" %}
{% load static %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            
            <div class="card shadow-lg border-0 rounded-3 overflow-hidden">
                
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0 text-light fw-bold">My Bus Pass</h4>
                </div>

                <div class="card-body text-center p-4">
                    <div class="qr-wrapper p-3 bg-light rounded-2 mb-4 d-inline-block border border-dark">
                        <img src="{{ student.Qr_Code.url }}" alt="QR Code" class="img-fluid" style="max-width: 200px;">
                    </div>

                    <div class="text-start mb-4">
                        <div class="d-flex justify-content-between border-bottom py-2">
                            <span class="fw-bold text-muted small uppercase">Student Name</span>
                            <span class="fw-bold">{{ student.Name }}</span>
                        </div>
                        <div class="d-flex justify-content-between border-bottom py-2">
                            <span class="fw-bold text-muted small">Student ID</span>
                            <span class="fw-bold ">{{ student.Stud_id }}</span>
                        </div>
                        <div class="d-flex justify-content-between border-bottom py-2">
                            <span class="fw-bold text-muted small">Assigned Bus</span>
                            <span class="">{{ student.Bus_Number }}</span>
                        </div>
                    </div>

                    <div class="d-grid">
                        <a href="{%url 'student_qr'%}" download class="btn btn-outline-primary btn-lg rounded-pill shadow-sm">
                            <i class="bi bi-download me-2"></i>Download QR Code
                        </a>
                    </div>
                </div>

                <div class="card-footer bg-white text-center border-0 pb-4">
                    <small class="text-muted">Please present this QR code to the bus conductor upon boarding.</small>
                </div>
            </div>

        </div>
    </div>
</div>


{% endblock %}
