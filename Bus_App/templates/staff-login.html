<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'landing-page/assets/css/LineIcons.2.0.css' %}">
    <link rel="stylesheet" href="{% static 'landing-page/assets/css/animate.css' %}">
    <link rel="stylesheet" href="{% static 'landing-page/assets/css/lindy-uikit.css' %}">
    <link rel="stylesheet" href="{% static 'assets/style.css' %}">



    
</head>
<body>

<section class="hero-section hero-style-5 img-bg d-flex align-items-center"
  style="min-height:100vh; background-image: url('{% static 'landing-page/assets/img/hero/hero-5/hero-bg.svg' %}')">

  <div class="container">
    <div class="row g-0 justify-content-center align-items-stretch">

      <div class="col-11 col-md-5 col-lg-5  d-none d-md-block wow fadeInLeft">
        <div class="h-100">
          <img src="{% static 'landing-page/assets/img/login-pic.jpg' %}" 
               alt="QR Bus Entry Illustration"
               class="img-fluid login-img">
        </div>
      </div>

      <div class="col-11 col-md-6 col-lg-4 wow fadeInRight d-flex">
        <div class="card    login-card  w-100">
          <div class="card-body p-4 p-sm-5">

            <div class="text-center mb-4">
              <h3 class="fw-bold">Staff Login</h3>
            </div>

            <form method="post" action="{% url 'staff_login_fn' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light "><i class="lni lni-user"></i></span>
                        <input type="text" name="username" value="{{ old_user }}" class="form-control border-start-0" placeholder="Username" required>
                    </div>
                    {% if u_error %}
                        <div class="text-danger mt-1 small">{{ u_error }}</div>
                    {% endif %}
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light "><i class="lni lni-lock"></i></span>
                        <input type="password" name="password" class="form-control border-start-0" placeholder="Password" required>
                    </div>
                    {% if p_error %}
                        <div class="text-danger mt-1 small">{{ p_error }}</div>
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold">Login</button>
            </form>

            <div class="text-center mt-4">
              <a href="{% url 'home_page' %}" class="text-decoration-none small text-secondary">
                <i class="lni lni-arrow-left"></i> Back to Home
              </a>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'landing-page/assets/js/wow.min.js' %}"></script>
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<script>new WOW().init();</script>

{% if messages %}
    {% for message in messages %}
        <script>
            swal("{{ message.tags|title }}", "{{ message }}", "{{ message.tags }}");
        </script>
    {% endfor %}
{% endif %}

</body>
</html>
