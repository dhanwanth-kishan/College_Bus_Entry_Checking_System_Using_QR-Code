<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TransitX - Bus Entry Scan</title>

  <!-- Font Awesome -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />

  <!-- Favicon -->
  <link rel="shortcut icon" type="image/png"
        href="{% static 'dashboard/src/assets/images/logos/favicon.png'%}" />

  <!-- Main CSS -->
  <link rel="stylesheet"
        href="{% static 'dashboard/src/assets/css/styles.min.css'%}" />

  <style>
    /* ================= SIDEBAR ================= */

    .left-sidebar {
      width: 260px;
      background: #fff;
      transition: 0.3s ease-in-out;
    }

    /* Mobile & Medium Screens */
    @media (max-width: 1199px) {
      .left-sidebar {
        position: fixed;
        left: -260px;
        top: 0;
        height: 100%;
        z-index: 1000;
      }

      #main-wrapper.show-sidebar .left-sidebar {
        left: 0;
      }

      /* Overlay */
      #main-wrapper.show-sidebar .body-wrapper::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.4);
        z-index: 900;
      }
    }

    /* Desktop (xl and up) */
    @media (min-width: 1200px) {
      .left-sidebar {
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
      }

      .body-wrapper {
        margin-left: 260px;
      }
    }

    /* ================= HERO SECTION ================= */

    .hero-image-wrapper {
      background: linear-gradient(rgba(255,255,255,0.9),
                  rgba(255,255,255,0.9));
      border-radius: 20px;
      padding: 40px 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    #scan-btn {
      background: linear-gradient(45deg, #6f42c1, #a020f0);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(111,66,193,0.4);
    }

    #scan-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(111,66,193,0.6);
    }

    #reader {
      margin-top: 40px;
      border-radius: 15px;
      overflow: hidden;
    }
  </style>
</head>

<body>

<div class="page-wrapper"
     id="main-wrapper"
     data-layout="vertical"
     data-navbarbg="skin6"
     data-sidebartype="full"
     data-sidebar-position="fixed"
     data-header-position="fixed">

  <!-- ================= SIDEBAR ================= -->
    <aside class="left-sidebar">
      <div>
        <div class="brand-logo d-flex align-items-center justify-content-between px-4 py-3">
          <h2 class="fw-bolder mb-0" style="color:purple;">TransitX</h2>
          <div class="close-btn d-xl-none d-block sidebartoggler cursor-pointer" id="sidebarCollapse">
            <i class="ti ti-x fs-8"></i>
          </div>
        </div>

        <nav class="sidebar-nav scroll-sidebar" data-simplebar>
          <ul id="sidebarnav">
            <li class="nav-small-cap">
              <i class="ti ti-dots nav-small-cap-icon fs-4"></i>
              <span class="hide-menu">Home</span>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'staff_dashboard' %}">
                <span><i class="fa-solid fa-house"></i></span>
                <span class="hide-menu">Dashboard</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'scan_qr' %}">
                <span><i class="ti ti-qrcode"></i></span>
                <span class="hide-menu">Scan QR Code</span>
              </a>
            </li>

            <li class="nav-small-cap">
              <i class="ti ti-dots nav-small-cap-icon fs-4"></i>
              <span class="hide-menu">Profile</span>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'staff_profile' %}">
                <span><i class="ti ti-user"></i></span>
                <span class="hide-menu">View Profile</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'display_staff_bus' %}">
                <span><i class="fa-solid fa-bus"></i></span>
                <span class="hide-menu">My Bus</span>
              </a>
            </li>
            
            <li class="sidebar-item mt-4">
              <a href="{% url 'staff_logout_fn' %}" class="sidebar-link text-danger">
                <span><i class="ti ti-logout"></i></span>
                <span class="hide-menu">Logout</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>
  <!-- ================= END SIDEBAR ================= -->



  <!-- ================= HEADER ================= -->
<div class="body-wrapper">
      
      <header class="app-header">
        <nav class="navbar navbar-expand-lg navbar-light border-bottom">
          <ul class="navbar-nav">
            <li class="nav-item d-block d-xl-none">
              <a class="nav-link sidebartoggler nav-icon-hover" id="headerCollapse" href="javascript:void(0)">
                <i class="ti ti-menu-2"></i>
              </a>
            </li>
          </ul>
          
          <div class="navbar-collapse justify-content-end px-0" id="navbarNav">
            <ul class="navbar-nav flex-row ms-auto align-items-center justify-content-end">
              <li class="nav-item dropdown">
                <a class="nav-link nav-icon-hover" href="javascript:void(0)" id="drop2" data-bs-toggle="dropdown" aria-expanded="false">
                  <img src="{{staff.Staff_Profile_Pic.url}}" alt="user" width="35" height="35" class="rounded-circle object-fit-cover">
                </a>
                <div class="dropdown-menu dropdown-menu-end dropdown-menu-animate-up" aria-labelledby="drop2">
                  <div class="message-body">
                    <a href="{% url 'staff_profile' %}" class="d-flex align-items-center gap-2 dropdown-item">
                      <i class="ti ti-user fs-6"></i>
                      <p class="mb-0 fs-3">My Profile</p>
                    </a>
                    <a href="{% url 'staff_logout_fn' %}" class="btn btn-outline-primary mx-3 mt-2 d-block">Logout</a>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </nav>
</header>
 
 
 
  <!-- ================= END HEADER ================= -->
 <div class="container py-5">

      <div class="hero-image-wrapper text-center mt-4">
        <h2>Bus Entry Scan</h2>
        <button id="scan-btn">Open Scanner</button>

        <div id="reader"></div>
        <div id="result" class="mt-3"></div>
      </div>

    </div>
  </div>

  <script src="https://unpkg.com/html5-qrcode"></script>
</div>

<!-- ================= SCRIPTS ================= -->

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- QR Library -->

<script src="{% static 'dashboard/src/assets/libs/jquery/dist/jquery.min.js'%}"></script>
<script src="{% static 'dashboard/src/assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js'%}"></script>
<script src="{% static 'dashboard/src/assets/js/sidebarmenu.js'%}"></script>
<script src="{% static 'dashboard/src/assets/js/app.min.js'%}"></script>
<script src="{% static 'dashboard/src/assets/libs/simplebar/dist/simplebar.js'%}"></script>

</body>
</html>
