{%extends 'staff-dashboard.html'%}
{%block content%}


<html>
<body>

  <div class="scan-container">
    
    {% if error %}
    <div class="alert error-box">{{ error }}</div>
    {% endif %}
    
    {% if success %}
    <div class="alert success-box">{{ success }}</div>
    {% endif %}
    
    {% if student %}
    <div class="student-card">
    <h4><b>ID:</b> {{ student.Stud_id }}</h4>
    <h4><b>Name:</b> {{ student.Name }}</h4>
    <h4><b>Bus Number:</b> {{ student.Bus_Number }}</h4>
  </div>
  {% endif %}
  
</div>


<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
</body>
</html>
{%endblock%}
