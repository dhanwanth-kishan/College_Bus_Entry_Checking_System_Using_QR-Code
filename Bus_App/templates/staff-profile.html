<!DOCTYPE html>
{%load static%}
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modernize Free</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="shortcut icon" type="image/png" href="{% static 'dashboard/src/assets/images/logos/favicon.png'%}" />
  <link rel="stylesheet" href="{% static 'dashboard/src/assets/css/styles.min.css'%}" />
  <link rel="stylesheet" href="{% static 'assets/style.css'%}" >

<body>
  <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full" data-sidebar-position="fixed" data-header-position="fixed">

    <aside class="left-sidebar">
      <div>
        <div class="brand-logo d-flex align-items-center justify-content-between px-4 py-3">
          <h2 class="fw-bolder mb-0" style="color:purple;">TransitX</h2>
          <div class="close-btn d-xl-none d-block sidebartoggler cursor-pointer" id="sidebarCollapse">
            <i class="ti ti-x fs-8"></i>
          </div>
        </div>

        <nav class="sidebar-nav scroll-sidebar" data-simplebar>
          <ul id="sidebarnav">
            <li class="nav-small-cap">
              <i class="ti ti-dots nav-small-cap-icon fs-4"></i>
              <span class="hide-menu">Home</span>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'staff_dashboard' %}">
                <span><i class="fa-solid fa-house"></i></span>
                <span class="hide-menu">Dashboard</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'scan_qr' %}">
                <span><i class="ti ti-qrcode"></i></span>
                <span class="hide-menu">Scan QR Code</span>
              </a>
            </li>

            <li class="nav-small-cap">
              <i class="ti ti-dots nav-small-cap-icon fs-4"></i>
              <span class="hide-menu">Profile</span>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'staff_profile' %}">
                <span><i class="ti ti-user"></i></span>
                <span class="hide-menu">View Profile</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="{% url 'display_staff_bus' %}">
                <span><i class="fa-solid fa-bus"></i></span>
                <span class="hide-menu">My Bus</span>
              </a>
            </li>
            
            <li class="sidebar-item mt-4">
              <a href="{% url 'staff_logout_fn' %}" class="sidebar-link text-danger">
                <span><i class="ti ti-logout"></i></span>
                <span class="hide-menu">Logout</span>
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </aside>
  <!-- ================= END SIDEBAR ================= -->



  <!-- ================= HEADER ================= -->
<div class="body-wrapper">
      
      <header class="app-header">
        <nav class="navbar navbar-expand-lg navbar-light border-bottom">
          <ul class="navbar-nav">
            <li class="nav-item d-block d-xl-none">
              <a class="nav-link sidebartoggler nav-icon-hover" id="headerCollapse" href="javascript:void(0)">
                <i class="ti ti-menu-2"></i>
              </a>
            </li>
          </ul>
          
          <div class="navbar-collapse justify-content-end px-0" id="navbarNav">
            <ul class="navbar-nav flex-row ms-auto align-items-center justify-content-end">
              <li class="nav-item dropdown">
                <a class="nav-link nav-icon-hover" href="javascript:void(0)" id="drop2" data-bs-toggle="dropdown" aria-expanded="false">
                  <img src="{{staff.Staff_Profile_Pic.url}}" alt="user" width="35" height="35" class="rounded-circle object-fit-cover">
                </a>
                <div class="dropdown-menu dropdown-menu-end dropdown-menu-animate-up" aria-labelledby="drop2">
                  <div class="message-body">
                    <a href="{% url 'staff_profile' %}" class="d-flex align-items-center gap-2 dropdown-item">
                      <i class="ti ti-user fs-6"></i>
                      <p class="mb-0 fs-3">My Profile</p>
                    </a>
                    <a href="{% url 'staff_logout_fn' %}" class="btn btn-outline-primary mx-3 mt-2 d-block">Logout</a>
                  </div>
                </div>
              </li>
            </ul>
          </div>
        </nav>
</header>
 
      <div class="container-fluid  ">
        <div class="row mt-5 justify-content-center">
          <div class="col-11 col-md-8 col-lg-5 profile-card-container">
            <div class="card profile-card shadow-lg border-0">
              <div class="card-body p-4 p-sm-5">
                <div class="text-center position-relative">
                  <img src="{{ staff.Staff_Profile_Pic.url }}" class="rounded-circle border border-4 border-white shadow-sm" style="width: 110px; height: 110px; object-fit: cover; margin-top: -20px;" alt="Profile Image">
                  <h2 class="fw-bolder mt-3 mb-2 text-dark">{{ staff.Name }}</h2>
                  <span class="badge bg-light-primary text-primary rounded-pill px-3 pt-2">Staff Profile</span>
                </div>

                <hr class="my-4 opacity-25">

                <form class="row g-3">
                  <div class="col-12">
                    <label class="form-label fw-semibold">Staff ID</label>
                    <div class="input-group">
                      <span class="input-group-text bg-white"><i class="ti ti-id"></i></span>
                      <input type="text" class="form-control" value="{{ staff.Staff_id }}" disabled>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Bus Number</label>
                    <input type="text" class="form-control" value="{{ staff.Bus_Number }}" disabled>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label fw-semibold">Bus Route</label>
                    <input type="text" class="form-control" value="{{ staff.Bus_Route }}" disabled>
                  </div>
                
                  <div class="col-12">
                    <label class="form-label fw-semibold">Phone Number</label>
                    <div class="input-group">
                      <span class="input-group-text bg-white"><i class="ti ti-phone"></i></span>
                      <input type="text" class="form-control" value="{{ staff.Phone_Number }}" disabled>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    </div>

  </div>



<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="{% static 'dashboard/src/assets/libs/bootstrap/dist/js/bootstrap.bundle.min.js'%}"></script>
<script src="{% static 'dashboard/src/assets/js/sidebarmenu.js'%}"></script>
<script src="{% static 'dashboard/src/assets/js/app.min.js'%}"></script>
<script src="{% static 'dashboard/src/assets/libs/simplebar/dist/simplebar.js'%}"></script>
</body>
</html>
